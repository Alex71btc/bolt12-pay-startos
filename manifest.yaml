id: bolt-pay
title: "BOLT12 Pay"
version: 0.2.85.0
release-notes: |
  Initial StartOS service packaging for BOLT12 Pay with separate LNDK service.
license: MIT

developer: "Alex71btc (https://github.com/Alex71btc)"
wrapper-repo: "https://github.com/Alex71btc/bolt12-pay-start9"
upstream-repo: "https://github.com/Alex71btc/lndk-pay"
support-site: "https://github.com/Alex71btc/bolt12-pay-start9/issues"
marketing-site: "https://github.com/Alex71btc/lndk-pay"
build: ["make"]
description:
  short: "Self-hosted Lightning payment server with BOLT12 support."
  long: |
    BOLT12 Pay is a self-hosted Lightning payment and identity server.

    This StartOS package runs BOLT12 Pay together with an embedded LNDK runtime
    inside a single service container.

    Features include:
    - BOLT12 offers via LNDK
    - LNURL and Lightning Address support
    - BOLT11 fallback
    - a simple web UI for self-hosted payment flows

assets:
  license: LICENSE
  icon: assets/icon.png
  instructions: instructions.md

main:
  type: docker
  image: main
  entrypoint: docker_entrypoint.sh
  args: []
  mounts:
    main: /data
    lnd: /mnt/lnd

health-checks:
  main:
    name: Web UI
    success-message: BOLT12 Pay is ready to be visited in a web browser
    type: script

backup:
  create:
    type: script
  restore:
    type: script

config:
  get:
    type: script
  set:
    type: script

volumes:
  main:
    type: data
  lnd:
    type: pointer
    package-id: lnd
    volume-id: main
    path: /
    readonly: true

interfaces:
  main:
    name: Web UI
    description: Web interface for BOLT12 Pay
    tor-config:
      port-mapping:
        80: "8081"
    lan-config:
      443:
        ssl: true
        internal: 8081
    ui: true
    protocols:
      - tcp
      - http

dependencies:
  lnd:
    version: ">=0.20.0 <0.22.0"
    description: Used to communicate with the Lightning Network.
    requirement:
      type: required
    config: ~

actions: {}
